- name: faststore
  referenceId: ZYS1XPEC
  description: FastStore monorepo — quality gate (lint, build, size, test:coverage, SonarQube scan)
  build:
    provider: dkcicd
    pipelines:
      - name: node-ci-v2
        parameters:
          privateRegistry: internal-npm
          awsAccountId: "053131491888"
          nodeVersion: 24-bookworm
          packageManager: pnpm
          nodeCommands:
            - ci:dkcicd
          shallowClone: false
          sonarHost: http://sonarqube.vtex.systems
          sonarProjectName: vtex_faststore_f0a862d5-9557-49f9-8d09-de40caa76622
          gitBaseBranchName: dev
          sonarExclusions: "**/dist/**,**/.next/**,**/@generated/**,**/__generated__/**,**/node_modules/**,**/*.d.ts,**/cypress/**,packages/storybook/**,packages/lighthouse/**,packages/diagnostics/**,packages/ui/**,packages/graphql-utils/**"
        runtime:
          architecture: amd64
        when:
          - event: pull_request
            source: branch

sonar.projectKey=vtex_faststore_f0a862d5-9557-49f9-8d09-de40caa76622
sonar.projectName=FastStore

# Source roots (one per package with Vitest tests in this iteration)
sonar.sources=packages/api/src,packages/cli/src,packages/components/src,packages/core/src,packages/sdk/src

# Test roots (api/components/core/sdk keep tests under test/, cli colocates them next to src/)
sonar.tests=packages/api/test,packages/cli/src,packages/components/test,packages/core/test,packages/sdk/test
sonar.test.inclusions=**/*.{test,spec}.{ts,tsx,js,jsx}

# Exclude tests, generated artifacts and stories from coverage computation
sonar.coverage.exclusions=**/*.{test,spec}.{ts,tsx,js,jsx},**/*.stories.{ts,tsx},**/__tests__/**,**/cypress/**,**/@generated/**,**/__generated__/**,**/*.d.ts

sonar.sourceEncoding=UTF-8

# NOTE: `sonar.exclusions` and `sonar.javascript.lcov.reportPaths` are intentionally NOT set here.
# The node-ci-v2 pipeline (configured in .vtex/deployment.yaml) overrides both via its
# `sonarExclusions` and `coverReportPath` parameters. The merged LCOV is produced at
# coverage/lcov.info by the `ci:dkcicd` script (see package.json), matching the pipeline default.

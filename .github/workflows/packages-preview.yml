name: Packages Preview

on:
  push:
    branches-ignore:
      - main

jobs:
  build:
    name: FastStore
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm i

      - name: Build
        run: pnpm build

      # pnpm pack resolves the `workspace:` and `catalog:` protocols into concrete
      # versions in the tarball's package.json (npm/yarn pack leave them untouched,
      # producing uninstallable preview packages). Storybook is intentionally skipped.
      - name: Pack packages with pnpm
        run: |
          mkdir -p artifacts
          pnpm --filter="./packages/*" --filter="!@faststore/storybook" exec \
            pnpm pack --pack-destination "$GITHUB_WORKSPACE/artifacts"

      # pkg-pr-new only accepts package directories, not tarballs, so extract the
      # resolved tarballs and hand the resulting directories to it.
      - name: Extract resolved packages
        run: |
          mkdir -p publish
          for tarball in artifacts/*.tgz; do
            dir="publish/$(basename "$tarball" .tgz)"
            mkdir -p "$dir"
            tar -xzf "$tarball" -C "$dir" --strip-components=1
          done

      - run: pnpm dlx pkg-pr-new publish './publish/*' --no-compact --packageManager=pnpm --commentWithSha
